name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from source
        id: extract
        run: |
          # Read version from the single source of truth: internal/buildinfo/version.go
          VERSION=$(sed -n 's/^const Version = "\(.*\)"/\1/p' internal/buildinfo/version.go)

          if [ -n "$VERSION" ]; then
            echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Detected version: v${VERSION}"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "Could not extract version from internal/buildinfo/version.go"
          fi

      - name: Check if tag exists
        if: steps.extract.outputs.found == 'true'
        id: check
        run: |
          TAG=${{ steps.extract.outputs.version }}
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.extract.outputs.found == 'true' && steps.check.outputs.exists != 'true'
        run: |
          TAG=${{ steps.extract.outputs.version }}
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"

      - name: Update _benchmark/go.mod version
        if: steps.extract.outputs.found == 'true' && steps.check.outputs.exists != 'true'
        run: |
          TAG=${{ steps.extract.outputs.version }}
          sed -i "s|github.com/gpdf-dev/gpdf v.*|github.com/gpdf-dev/gpdf ${TAG}|" _benchmark/go.mod
          if git diff --quiet; then
            echo "No changes to _benchmark/go.mod"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add _benchmark/go.mod
            git commit -m "chore: update _benchmark/go.mod to ${TAG}"
            git push origin main
          fi
